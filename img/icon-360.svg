<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Outer orbit ring -->
  <ellipse cx="24" cy="24" rx="20" ry="10" stroke="#4A9FD4" stroke-width="1.6" fill="none"/>
  <!-- Second orbit -->
  <ellipse cx="24" cy="24" rx="20" ry="10" stroke="#4A9FD4" stroke-width="1.6" fill="none"
           transform="rotate(60 24 24)" opacity="0.5"/>
  <!-- Third orbit -->
  <ellipse cx="24" cy="24" rx="20" ry="10" stroke="#4A9FD4" stroke-width="1.6" fill="none"
           transform="rotate(120 24 24)" opacity="0.3"/>
  <!-- Center sphere -->
  <circle cx="24" cy="24" r="5" stroke="#4A9FD4" stroke-width="1.6" fill="rgba(74,159,212,0.15)"/>
  <!-- 360 text inside -->
  <text x="20.5" y="27" font-family="Barlow Condensed, sans-serif" font-weight="700"
        font-size="7" fill="#4A9FD4">360</text>
  <!-- Orbit dot -->
  <circle cx="43" cy="19" r="2.5" fill="#4A9FD4"/>
</svg>
