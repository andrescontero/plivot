<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3A5C"/>
      <stop offset="100%" stop-color="#0A1525"/>
    </linearGradient>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D2A4A"/>
      <stop offset="100%" stop-color="#1A4060"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#sky1)"/>
  <!-- Sky glow -->
  <ellipse cx="200" cy="80" rx="180" ry="100" fill="rgba(74,159,212,0.12)"/>
  <!-- Clouds -->
  <ellipse cx="100" cy="100" rx="80" ry="30" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="300" cy="80" rx="100" ry="25" fill="rgba(255,255,255,0.04)"/>
  <!-- Mountains far -->
  <path d="M0 220 L60 120 L120 180 L180 90 L240 160 L300 80 L360 140 L400 100 L400 280 L0 280 Z"
        fill="#0D1E30" opacity="0.8"/>
  <!-- Mountains near -->
  <path d="M0 280 L80 170 L160 220 L240 140 L320 200 L400 150 L400 280 Z"
        fill="#071018"/>
  <!-- Drone silhouette -->
  <g transform="translate(180 60)">
    <rect x="-8" y="-4" width="16" height="8" rx="2" fill="rgba(74,159,212,0.6)"/>
    <line x1="-8" y1="-2" x2="-18" y2="-10" stroke="rgba(74,159,212,0.5)" stroke-width="1.5"/>
    <line x1="8" y1="-2" x2="18" y2="-10" stroke="rgba(74,159,212,0.5)" stroke-width="1.5"/>
    <ellipse cx="-18" cy="-11" rx="7" ry="2.5" fill="none" stroke="rgba(74,159,212,0.5)" stroke-width="1"/>
    <ellipse cx="18" cy="-11" rx="7" ry="2.5" fill="none" stroke="rgba(74,159,212,0.5)" stroke-width="1"/>
  </g>
  <!-- Bottom label -->
  <rect x="0" y="220" width="400" height="60" fill="rgba(7,10,20,0.75)"/>
  <text x="20" y="248" font-family="Barlow Condensed, sans-serif" font-weight="700"
        font-size="18" fill="white" letter-spacing="1">MOUNTAIN TOUR</text>
  <text x="20" y="268" font-family="Barlow, sans-serif" font-size="11" fill="#8A9EC4">Aerial panoramic experience</text>
</svg>
