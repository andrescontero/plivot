<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2A4A"/>
      <stop offset="50%" stop-color="#2A4060"/>
      <stop offset="100%" stop-color="#3A5070"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#sky2)"/>
  <!-- Canyon walls -->
  <path d="M0 0 L0 280 L80 280 L80 60 L60 0 Z" fill="#1A1008" opacity="0.9"/>
  <path d="M400 0 L400 280 L320 280 L320 40 L340 0 Z" fill="#1A1008" opacity="0.9"/>
  <!-- Canyon depth -->
  <path d="M80 280 L80 60 L120 30 L160 80 L200 50 L240 90 L280 20 L320 40 L320 280 Z"
        fill="#0D0A06"/>
  <!-- Sky between walls -->
  <ellipse cx="200" cy="40" rx="120" ry="60" fill="rgba(74,159,212,0.2)"/>
  <!-- Rock textures -->
  <path d="M80 100 L120 90 L130 110 L100 120 Z" fill="rgba(255,255,255,0.04)"/>
  <path d="M280 80 L320 70 L325 100 L290 105 Z" fill="rgba(255,255,255,0.03)"/>
  <!-- River at bottom -->
  <ellipse cx="200" cy="275" rx="60" ry="8" fill="rgba(74,159,212,0.3)"/>
  <!-- Label -->
  <rect x="0" y="225" width="400" height="55" fill="rgba(7,10,20,0.8)"/>
  <text x="20" y="250" font-family="Barlow Condensed, sans-serif" font-weight="700"
        font-size="18" fill="white" letter-spacing="1">CANYON DEPTHS</text>
  <text x="20" y="270" font-family="Barlow, sans-serif" font-size="11" fill="#8A9EC4">360° immersive canyon fly-through</text>
</svg>
