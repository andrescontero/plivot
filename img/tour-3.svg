<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1528"/>
      <stop offset="100%" stop-color="#1A2840"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#sky3)"/>
  <!-- City glow -->
  <ellipse cx="200" cy="260" rx="280" ry="80" fill="rgba(74,159,212,0.15)"/>
  <!-- Buildings skyline -->
  <rect x="0"   y="160" width="30"  height="120" fill="#0D1828"/>
  <rect x="30"  y="120" width="25"  height="160" fill="#111E30"/>
  <rect x="55"  y="140" width="35"  height="140" fill="#0D1828"/>
  <rect x="90"  y="100" width="20"  height="180" fill="#111E30"/>
  <rect x="110" y="130" width="28"  height="150" fill="#0D1828"/>
  <rect x="138" y="80"  width="22"  height="200" fill="#111E30"/>
  <rect x="160" y="60"  width="40"  height="220" fill="#0D1828"/>
  <rect x="200" y="90"  width="25"  height="190" fill="#111E30"/>
  <rect x="225" y="110" width="30"  height="170" fill="#0D1828"/>
  <rect x="255" y="70"  width="35"  height="210" fill="#111E30"/>
  <rect x="290" y="130" width="28"  height="150" fill="#0D1828"/>
  <rect x="318" y="100" width="22"  height="180" fill="#111E30"/>
  <rect x="340" y="145" width="30"  height="135" fill="#0D1828"/>
  <rect x="370" y="120" width="30"  height="160" fill="#111E30"/>
  <!-- Windows lights -->
  <rect x="165" y="70"  width="4" height="3" fill="rgba(74,159,212,0.8)"/>
  <rect x="175" y="85"  width="4" height="3" fill="rgba(255,220,120,0.7)"/>
  <rect x="162" y="100" width="4" height="3" fill="rgba(74,159,212,0.6)"/>
  <rect x="258" y="80"  width="4" height="3" fill="rgba(255,220,120,0.8)"/>
  <rect x="270" y="95"  width="4" height="3" fill="rgba(74,159,212,0.7)"/>
  <rect x="95"  y="110" width="4" height="3" fill="rgba(255,220,120,0.6)"/>
  <rect x="140" y="90"  width="4" height="3" fill="rgba(74,159,212,0.8)"/>
  <!-- Label -->
  <rect x="0" y="225" width="400" height="55" fill="rgba(7,10,20,0.85)"/>
  <text x="20" y="250" font-family="Barlow Condensed, sans-serif" font-weight="700"
        font-size="18" fill="white" letter-spacing="1">CITY SKYLINE</text>
  <text x="20" y="270" font-family="Barlow, sans-serif" font-size="11" fill="#8A9EC4">Urban aerial 4K capture</text>
</svg>
