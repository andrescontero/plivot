<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2030"/>
      <stop offset="40%" stop-color="#2A4060"/>
      <stop offset="100%" stop-color="#1A3050"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A4060"/>
      <stop offset="100%" stop-color="#0A1828"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#sky4)"/>
  <!-- Sun/horizon glow -->
  <ellipse cx="200" cy="145" rx="200" ry="60" fill="rgba(255,160,60,0.15)"/>
  <ellipse cx="200" cy="150" rx="60" ry="30" fill="rgba(255,180,80,0.2)"/>
  <!-- Sun half circle -->
  <path d="M170 150 A30 30 0 0 1 230 150 Z" fill="rgba(255,200,100,0.5)"/>
  <!-- Ocean -->
  <rect x="0" y="150" width="400" height="130" fill="url(#ocean)"/>
  <!-- Ocean reflections -->
  <rect x="180" y="155" width="5" height="120" fill="rgba(255,180,80,0.15)"/>
  <rect x="195" y="160" width="10" height="110" fill="rgba(255,180,80,0.1)"/>
  <rect x="215" y="158" width="5" height="115" fill="rgba(255,180,80,0.12)"/>
  <!-- Waves -->
  <path d="M0 180 Q50 175 100 182 Q150 188 200 180 Q250 172 300 180 Q350 187 400 180 L400 185 Q350 192 300 185 Q250 177 200 185 Q150 193 100 187 Q50 180 0 185 Z"
        fill="rgba(255,255,255,0.06)"/>
  <path d="M0 200 Q60 196 120 202 Q180 208 240 200 Q300 193 360 200 L400 198 L400 205 Q340 207 280 205 Q220 213 160 205 Q100 197 40 205 L0 207 Z"
        fill="rgba(255,255,255,0.04)"/>
  <!-- Hotel/resort outline -->
  <rect x="280" y="100" width="100" height="50" fill="#0D1828" opacity="0.7"/>
  <rect x="290" y="95"  width="80"  height="8"  fill="#0D1828" opacity="0.7"/>
  <!-- Pool shimmer -->
  <ellipse cx="330" cy="148" rx="30" ry="8" fill="rgba(74,159,212,0.3)"/>
  <!-- Label -->
  <rect x="0" y="225" width="400" height="55" fill="rgba(7,10,20,0.85)"/>
  <text x="20" y="250" font-family="Barlow Condensed, sans-serif" font-weight="700"
        font-size="18" fill="white" letter-spacing="1">COASTAL RESORT</text>
  <text x="20" y="270" font-family="Barlow, sans-serif" font-size="11" fill="#8A9EC4">Sunset aerial video tour</text>
</svg>
